<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NarutoProject</title>
    <link rel="shortcut icon" href="icon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Verdana, Arial, sans-serif;
            margin: 0;
            background: #000 url("Background2.png") fixed center top;
            background-size: cover;
            color: #333;
        }

        .container {
            width: 1450px;
            margin: 0 auto;
            background-color: #fff;
            border: 1px solid #333;
        }

        header {
            background: url("Banner.png") no-repeat center center;
            background-size: cover;
            height: 150px;
            position: relative;
            border-bottom: 5px solid #ff8c00;
        }

        .logo {
            padding: 20px;
        }

        .logo img {
            max-height: 100px;
        }

        .status-box {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px 10px;
            font-size: 11px;
            border: 1px solid #555;
        }

        .layout-wrapper {
            display: flex;
        }

        aside {
            width: 200px;
            background-color: #f0f0f0;
            border-right: 1px solid #ccc;
            min-height: 600px;
        }

        .menu-block {
            margin-bottom: 15px;
        }

        .menu-title {
            background: linear-gradient(to bottom, #f9f9f9, #d5d5d5);
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            border-top: 1px solid #fff;
            border-bottom: 1px solid #aaa;
            text-transform: uppercase;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-list li {
            border-bottom: 1px solid #ddd;
        }

        .menu-list li a {
            display: block;
            padding: 6px 10px 6px 20px;
            font-size: 11px;
            color: #333;
            text-decoration: none;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><circle cx="2" cy="2" r="2" fill="%23888"/></svg>') no-repeat 8px center;
        }

        .menu-list li a:hover {
            background-color: #fff;
            color: #ff8c00;
        }

        main {
            flex: 1;
            padding: 15px;
            background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="2" height="2"><rect width="2" height="2" fill="%23f9f9f9"/></svg>');
        }

        .content-box {
            background-color: #ff9933;
            border: 1px solid #d35400;
            padding: 15px;
            min-height: 400px;
            text-align: center;
        }

        .landing-page {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 30px;
            margin-top: 20px;
        }

        .landing-media {
            flex: 1;
            max-width: 820px;
        }

        .landing-media img {
            border: 3px solid #d35400;
            width: 100%;
            height: auto;
            display: block;
        }

        .login-box {
            width: 350px;
            background-color: #ff9933;
            border: 2px solid #d35400;
            padding: 20px;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
        }

        .login-title {
            font-family: Impact, sans-serif;
            font-size: 20px;
            color: #fff;
            background-color: #d35400;
            padding: 8px 12px;
            margin: -20px -20px 20px -20px;
            border-bottom: 2px solid #a04000;
            text-transform: uppercase;
            text-align: left;
            text-shadow: 1px 1px 0px #702000;
        }

        .login-box label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #000;
            text-align: left;
            margin-bottom: 5px;
        }

        .login-box input {
            width: 100%;
            padding: 8px;
            font-size: 12px;
            border: 1px solid #d35400;
            background-color: #fff;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .login-box button {
            width: 100%;
            background: linear-gradient(to bottom, #ffb366, #ff8000);
            border: 1px solid #d35400;
            color: #000;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .login-box button:hover {
            background: #ff9933;
            color: #fff;
        }

        .login-links {
            margin-top: 15px;
            font-size: 11px;
            text-align: center;
        }

        .login-links a {
            color: #b30000;
            text-decoration: none;
            font-weight: bold;
        }

        .login-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <a href="NarutoProject.html"><img src="logo.png" alt="Naruto Project logo"></a>
            </div>
            <div class="status-box">
                Online: 248 | Visitantes: 1.024
            </div>
        </header>
        <div class="layout-wrapper">
            <aside>
                <div class="menu-block">
                    <div class="menu-title">» narutoPROJECT</div>
                    <ul class="menu-list">
                        <li><a href="Sobre.html">Sobre</a></li>
                        <li><a href="Equipe.html">Equipe</a></li>
                    </ul>
                </div>
                <div class="menu-block">
                    <div class="menu-title">» Curiosidades</div>
                    <ul class="menu-list">
                        <li><a href="Hokages.html">Hokages</a></li>
                        <li><a href="Openings.html">Openings</a></li>
                        <li><a href="Filmes.html">Filmes</a></li>
                        <li><a href="Volumes.html">Volumes</a></li>
                    </ul>
                </div>
            </aside>
            <main>
                <div class="landing-page">
                    <div class="landing-media">
                        <img src="LandingPage.png" alt="Naruto Welcome Logo">
                    </div>

                    <div class="login-box">
                        <div class="login-title">» Área do Membro</div>
                        <form action="#" method="POST" onsubmit="return false;">
                            <label for="username">Usuário:</label>
                            <input type="text" id="username" name="username" placeholder="Seu usuário..." required>

                            <label for="password">Senha:</label>
                            <input type="password" id="password" name="password" placeholder="Sua senha..." required>

                            <button type="submit">Entrar</button>

                            <div class="login-links">
                                <a href="#">Cadastrar-se</a> | <a href="#">Esqueceu a senha?</a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>

</html>
